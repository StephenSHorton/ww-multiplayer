# Curated Gecko codes for The Legend of Zelda: The Wind Waker (GZLE01, NTSC-U).
#
# Sourced from well-known community packs:
#   - gamemasterplc's cheat codes
#     (sites.google.com/site/gamemasterplcscheatcodes/nintendo-gamecube/the-legend-of-zelda-the-wind-waker-gzle01)
#   - gc-forever WW Gecko codes thread
#     (gc-forever.com/forums/viewtopic.php?t=2135)
#
# Nothing is enabled by default. Open Dolphin's game properties (right-click
# the game in the game list → Properties → Gecko Codes) and tick the codes
# you want for your current test. This file lives at:
#   <USER_DIR>/GameSettings/GZLE01.ini
#
# `ww-multiplayer dolphin2` copies the repo's cheats/GZLE01.ini into both
# Dolphin user dirs if no GZLE01.ini exists there yet. If one already
# exists, dolphin2 leaves it alone — see cheats/GZLE01.ini in the repo to
# merge sections manually.

