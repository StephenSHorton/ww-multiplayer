name: Release

# Triggered by pushing a tag like `v0.1.0`. Builds the C side with devkitPPC
# + Freighter, regenerates the embedded T2 blob, builds the Windows binary,
# and publishes a GitHub Release with ww-multiplayer.exe attached.
#
# We don't ship patched.dol — that would be a derivative of the entire
# Wind Waker DOL (copyrighted). The standalone ww-multiplayer.exe contains only our IP
# (the new code section + a list of in-DOL patch records); end users supply
# their own legitimate Wind Waker ISO and run `ww-multiplayer.exe patch <their.iso>`.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The CI runner doesn't actually rebuild the C-side blob — that needs
      # both devkitPPC (large install) and the user's vanilla DOL (which
      # we can't ship). We trust the committed `internal/inject/blob.go`,
      # regenerated locally via `python scripts/extract_blob.py` before
      # tagging. The verify step below catches the obvious "blob got
      # accidentally emptied" case.
      #
      # Future: ship a stripped placeholder DOL (zeroed game code, symbol
      # table preserved) so Freighter can link against real game symbols
      # at known addresses without distributing copyrighted bytes — would
      # let CI re-extract on every release. Out of scope for v0.1.x.
      # All Go steps use GOOS=windows because internal/dolphin/* depends on
      # Win32 APIs (syscall.NewLazyDLL, syscall.Handle, kernel32.dll) — the
      # package is Windows-only and vet/build under GOOS=linux can't even
      # parse memory.go. Cross-targeting Linux is meaningless here; the
      # whole runtime needs ReadProcessMemory.
      - name: Verify committed blob + go vet (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          if ! grep -q "var T2Bytes" internal/inject/blob.go; then
            echo "::error::internal/inject/blob.go is missing T2Bytes — regenerate via scripts/extract_blob.py"
            exit 1
          fi
          go vet ./...

      - name: Build ww-multiplayer.exe (Windows amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o ww-multiplayer.exe .
          ls -la ww-multiplayer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ww-windows-amd64
          path: ww-multiplayer.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ww-multiplayer.exe
          generate_release_notes: true
          body: |
            ## Wind Waker Multiplayer ${{ github.ref_name }}

            **Requires your own legitimate copy of The Legend of Zelda: The Wind Waker (NTSC-U, GZLE01)** as a `.iso` or `.ciso` file.

            ### Quick start

            1. Download `ww-multiplayer.exe` below.
            2. Patch your ISO:
               ```
               ww-multiplayer.exe patch path\to\your-wind-waker.iso
               ```
               This produces `your-wind-waker-multiplayer.iso` next to the input.
            3. Boot the patched ISO in Dolphin.
            4. To play:
               - Host: `ww-multiplayer.exe host [your-name]` (prints the host IP for the other player)
               - Join: `ww-multiplayer.exe join <host-ip> [your-name]`

            See the README for full setup, two-Dolphin local play scripts, and known issues.
