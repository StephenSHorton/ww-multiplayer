name: Release

# Triggered by pushing a tag like `v0.1.0`. Builds Windows + macOS
# binaries and publishes a single GitHub Release with both attached.
#
# We don't ship patched.dol — that would be a derivative of the entire
# Wind Waker DOL (copyrighted). The shipped binaries contain only our IP
# (the new code section + a list of in-DOL patch records); end users
# supply their own legitimate Wind Waker ISO and run `<binary> patch`.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Verify committed blob hasn't accidentally been emptied. We don't
      # rebuild the C side here (needs devkitPPC + the user's vanilla
      # DOL); regenerate locally via `python scripts/extract_blob.py`
      # before tagging.
      - name: Verify committed blob + go vet (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          if ! grep -q "var T2Bytes" internal/inject/blob.go; then
            echo "::error::internal/inject/blob.go is missing T2Bytes — regenerate via scripts/extract_blob.py"
            exit 1
          fi
          go vet ./...

      - name: Build ww-multiplayer.exe (Windows amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o ww-multiplayer.exe .
          ls -la ww-multiplayer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ww-windows-amd64
          path: ww-multiplayer.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      # scripts/build-mac.sh handles per-arch compile, lipo into a
      # universal binary, and packaging into a .app + tarball.
      - name: Build universal binary + .app bundle
        run: ./scripts/build-mac.sh "${GITHUB_REF_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ww-macos-universal
          path: dist/ww-multiplayer-macos.tar.gz

  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ww-windows-amd64
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: ww-macos-universal
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ww-multiplayer.exe
            artifacts/ww-multiplayer-macos.tar.gz
          generate_release_notes: true
          body: |
            ## Wind Waker Multiplayer ${{ github.ref_name }}

            **Requires your own legitimate copy of The Legend of Zelda: The Wind Waker (NTSC-U, GZLE01)** as a `.iso` or `.ciso` file.

            ### Windows

            1. Download `ww-multiplayer.exe`.
            2. `ww-multiplayer.exe patch path\to\your-wind-waker.iso`
            3. Boot the patched ISO in Dolphin.
            4. Host: `ww-multiplayer.exe host [name]`. Join: `ww-multiplayer.exe join <host-ip> [name]`.

            ### macOS (Apple Silicon + Intel)

            1. Download and untar `ww-multiplayer-macos.tar.gz`. Inside you'll find `ww-multiplayer` (universal binary) and `WW Multiplayer.app` (Finder-clickable wrapper).
            2. `./ww-multiplayer patch ~/Roms/your-wind-waker.iso`
            3. Boot the patched ISO in Dolphin.
            4. **macOS requires sudo** to read Dolphin's process memory (the kernel gates `task_for_pid` behind SIP). Run as `sudo ./ww-multiplayer host [name]` / `sudo ./ww-multiplayer join <host-ip> [name]`. The `.app` bundle does this automatically.

            See the README for full setup, two-Dolphin local play, and known issues.
